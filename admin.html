<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRMS Admin Panel</title>
    <style>
        :root { --primary: #1a237e; --bg: #2c3e50; --card: #ffffff; --danger: #c62828; --success: #2e7d32; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .admin-container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.3rem; text-align: center; }
        h3 { font-size: 1rem; color: #555; margin: 20px 0 10px 0; }
        
        label { font-size: 12px; font-weight: bold; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        
        .section-divider { margin: 25px 0; border-top: 1px solid #eee; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div id="loginCard" class="card">
        <h2>Admin Access</h2>
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button class="btn-blue" onclick="checkLogin()">Login to Dashboard</button>
    </div>

    <div id="adminDash" class="card hidden">
        <h2>HRMS Tea Club Admin</h2>

        <div class="section">
            <label>Verify Cash Payment</label>
            <input type="text" id="verifyId" placeholder="Enter Employee ID">
            <button class="btn-green" onclick="processAction('verify', 'verifyId')">Mark as PAID</button>
        </div>

        <div class="section-divider"></div>

        <div class="section">
            <label>Record New Expense</label>
            <input type="text" id="expDesc" placeholder="Description (e.g., Milk & Sugar)">
            <input type="number" id="expAmt" placeholder="Amount (₹)">
            <button class="btn-red" onclick="saveExpense()">Deduct Expense</button>
        </div>

        <div class="section-divider"></div>

        <div class="section">
            <label>Update Monthly Subscription Cost</label>
            <input type="number" id="newCost" placeholder="New Monthly Amount (₹)">
            <button class="btn-blue" onclick="processAction('cost', 'newCost')">Update Price</button>
        </div>

        <a href="index.html" class="back-link">← Return to Home</a>
    </div>
</div>

<script>
    // Replace with your actual Web App URL from Google Apps Script
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkuVfwWY-vLKex498qU3DgSEj7CBqzpKsAKscYAnBlFcc31mxT2mR9lSr_srpghgw8/exec';

    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "HRMS2026") {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('adminDash').classList.remove('hidden');
        } else {
            alert("Incorrect Password!");
        }
    }

    // Handles simple one-value actions (Verify and Cost)
    async function processAction(actionType, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return alert("Please enter a value");

        const btn = event.target;
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "Processing...";

        const fd = new FormData();
        fd.append('action', actionType);
        fd.append('value', val);

        try {
            await fetch(scriptURL, { method: 'POST', body: fd });
            alert("Update Successful!");
            document.getElementById(inputId).value = "";
        } catch (e) {
            alert("Error updating data.");
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    // Handles the two-value Expense action
    async function saveExpense() {
        const desc = document.getElementById('expDesc').value;
        const amt = document.getElementById('expAmt').value;

        if(!desc || !amt) return alert("Please fill both Description and Amount");

        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "Processing...";

        const fd = new FormData();
        fd.append('action', 'expense');
        fd.append('desc', desc);  // Expense Description
        fd.append('value', amt);  // Expense Amount

        try {
            await fetch(scriptURL, { method: 'POST', body: fd });
            alert("Expense recorded successfully!");
            document.getElementById('expDesc').value = "";
            document.getElementById('expAmt').value = "";
        } catch (e) {
            alert("Error saving expense.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Deduct Expense";
        }
    }
</script>
</body>
</html>
