<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tea Club Admin</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .admin-card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 400px; }
        .hidden { display: none; }
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-act { background: #1a237e; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-red { background: #c0392b; }
        .btn-green { background: #27ae60; }
        .section { border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="login" class="admin-card">
    <h2 style="text-align:center">Admin Access</h2>
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-act" onclick="login()">Login</button>
</div>

<div id="dash" class="admin-card hidden">
    <h2 style="color:#1a237e">Admin Dashboard</h2>
    <div class="section">
        <label>Update Cost (₹)</label>
        <input type="number" id="cVal">
        <button class="btn-act" onclick="send('cost', 'cVal')">Update Price</button>
    </div>
    <div class="section">
        <label>Deduct Expense (₹)</label>
        <input type="number" id="eVal">
        <button class="btn-act btn-red" onclick="send('expense', 'eVal')">Record Expense</button>
    </div>
    <div class="section">
        <label>Verify Paid (Emp ID)</label>
        <input type="text" id="vVal">
        <button class="btn-act btn-green" onclick="send('verify', 'vVal')">Mark as PAID</button>
    </div>
    <button onclick="location.href='index.html'" style="background:none; border:none; color:blue; cursor:pointer;">← Back</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkuVfwWY-vLKex498qU3DgSEj7CBqzpKsAKscYAnBlFcc31mxT2mR9lSr_srpghgw8/exec';

    function login() {
        if(document.getElementById('pass').value === "HRMS2026") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
        } else { alert("Wrong Password"); }
    }

    function send(action, inputId) {
        const val = document.getElementById(inputId).value;
        const formData = new FormData();
        formData.append('action', action);
        formData.append('value', val);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(() => { alert("Updated!"); document.getElementById(inputId).value = ""; })
        .catch(e => alert("Error"));
    }
</script>
</body>
</html>
