<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Club Admin</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .admin-card { background: white; color: #333; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-act { background: #1a237e; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-red { background: #c0392b; }
        .btn-green { background: #27ae60; }
        .section { border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
    </style>
</head>
<body>

<div id="login" class="admin-card">
    <h2 style="text-align:center">Admin Access</h2>
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-act" onclick="login()">Login</button>
</div>

<div id="dash" class="admin-card hidden">
    <h2 style="color:#1a237e; margin-top:0">Admin Control</h2>
    
    <div class="section">
        <label>Update Cost (₹)</label>
        <input type="number" id="cVal" placeholder="New Monthly Price">
        <button class="btn-act" onclick="send('cost', 'cVal')">Update Price</button>
    </div>

    <div class="section">
        <label>Deduct Expense (₹)</label>
        <input type="number" id="eVal" placeholder="Amount Spent">
        <button class="btn-act btn-red" onclick="send('expense', 'eVal')">Record Expense</button>
    </div>

    <div class="section">
        <label>Verify Paid (Emp ID)</label>
        <input type="text" id="vVal" placeholder="Employee ID" inputmode="numeric">
        <button class="btn-act btn-green" onclick="send('verify', 'vVal')">Mark as PAID</button>
    </div>

    <button onclick="location.href='index.html'" style="background:none; border:none; color:#1a237e; text-decoration: underline; cursor:pointer;">← Logout & Back</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkuVfwWY-vLKex498qU3DgSEj7CBqzpKsAKscYAnBlFcc31mxT2mR9lSr_srpghgw8/exec';

    function login() {
        if(document.getElementById('pass').value === "HRMS2026") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
        } else { alert("Wrong Password"); }
    }

    function send(action, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return alert("Please enter a value");
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "Updating...";

        const formData = new FormData();
        formData.append('action', action);
        formData.append('value', val);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(() => { 
            alert("Record Updated!"); 
            document.getElementById(inputId).value = ""; 
        })
        .catch(e => alert("Error communicating with Sheet"))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = originalText;
        });
    }
</script>
</body>
</html>
