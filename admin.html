<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; margin: 0; padding: 15px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; display: flex; flex-direction: column; }
        .hidden { display: none; }
        h3 { margin-top: 0; color: #1a237e; text-align: center; }
        input { padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .btn-p { background: #1a237e; }
        .btn-e { background: #c0392b; }
        .btn-v { background: #27ae60; }
        .row { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
        label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="login" class="card">
    <h3>Admin Login</h3>
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-p" onclick="doLogin()">Login</button>
</div>

<div id="dash" class="card hidden">
    <h3>Control Panel</h3>
    <div class="row">
        <label>Update Price</label>
        <input type="number" id="c" placeholder="New Cost">
        <button class="btn-p" onclick="act('cost','c')">Update</button>
    </div>
    <div class="row">
        <label>Expense</label>
        <input type="number" id="e" placeholder="Amount">
        <button class="btn-e" onclick="act('expense','e')">Deduct</button>
    </div>
    <div class="row">
        <label>Verify ID</label>
        <input type="text" id="v" placeholder="Emp ID">
        <button class="btn-v" onclick="act('verify','v')">Mark Paid</button>
    </div>
    <a href="index.html" style="text-align:center; font-size: 13px; color: #999; text-decoration:none;">Exit</a>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkuVfwWY-vLKex498qU3DgSEj7CBqzpKsAKscYAnBlFcc31mxT2mR9lSr_srpghgw8/exec';

    function doLogin() {
        if(document.getElementById('pass').value === "HRMS2026") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
        } else alert("Error");
    }

    function act(action, id) {
        const val = document.getElementById(id).value;
        if(!val) return;
        const btn = event.target;
        btn.disabled = true; btn.innerText = "...";
        
        const fd = new FormData();
        fd.append('action', action);
        fd.append('value', val);

        fetch(scriptURL, { method: 'POST', body: fd })
        .then(() => { alert("Saved!"); document.getElementById(id).value=""; })
        .finally(() => { btn.disabled = false; btn.innerText = "Update"; });
    }
</script>
</body>
</html>
