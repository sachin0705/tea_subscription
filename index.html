<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Tea Club</title>
    <style>
        :root { --primary: #1a237e; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .dashboard-header { background: var(--primary); color: white; padding: 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .fund-circle { text-align: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 50%; width: 120px; height: 120px; display: flex; flex-direction: column; justify-content: center; border: 2px solid #ffeb3b; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .admin-login { margin-top: 40px; text-align: center; border-top: 1px solid #ddd; padding-top: 20px; }
        .admin-link { color: #999; text-decoration: none; font-size: 13px; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-header">
        <div>
            <h1 style="margin:0">HRMS Tea Club</h1>
            <p>Community Vending Machine</p>
        </div>
        <div class="fund-circle">
            <small>Net Funds</small>
            <span id="netFunds" style="font-size: 20px; font-weight: bold;">Loading...</span>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Subscribe Now</h3>
            <form id="subForm">
                <input type="text" name="empId" placeholder="Employee ID" required>
                <input type="text" name="empName" placeholder="Full Name" required>
                <input type="hidden" name="action" value="ADD">
                <button type="submit" id="subBtn">Join Club</button>
            </form>
            <p id="msg" style="font-size:12px; text-align:center; color: green;"></p>
        </div>

        <div class="card">
            <h3>Subscribers List</h3>
            <table>
                <thead><tr><th>Name</th><th>ID</th><th>Status</th></tr></thead>
                <tbody id="memberList"><tr><td colspan="3">Data syncs with Google Sheets...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="admin-login">
        <a href="admin.html" class="admin-link">🔒 Admin Access</a>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkuVfwWY-vLKex498qU3DgSEj7CBqzpKsAKscYAnBlFcc31mxT2mR9lSr_srpghgw8/exec';

    document.getElementById('subForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(res => {
                document.getElementById('msg').innerText = "Success! Please pay admin ₹200.";
                btn.innerText = "Joined";
                e.target.reset();
            })
            .catch(err => alert("Error: " + err));
    });
</script>
</body>
</html>
