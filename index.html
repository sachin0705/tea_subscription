<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRMS Tea Club Dashboard</title>
    <style>
        :root { --primary: #1a237e; --bg: #f0f2f5; --success: #2e7d32; --danger: #c62828; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Mobile Friendly Header */
        .dashboard-header { 
            background: var(--primary); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            margin-bottom: 15px; 
        }
        .fund-circle { 
            margin-top: 15px;
            background: rgba(255,255,255,0.15); 
            padding: 15px; 
            border-radius: 50%; 
            width: 100px; 
            height: 100px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            border: 2px solid #ffeb3b; 
        }

        /* Responsive Grid */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) {
            .grid { grid-template-columns: 350px 1fr; }
            .dashboard-header { flex-direction: row; justify-content: space-between; text-align: left; padding: 30px; }
            .fund-circle { margin-top: 0; }
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h3 { margin-top: 0; font-size: 1.2rem; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* Touch-friendly inputs */
        input, button { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }

        /* Scrollable Table for Mobile */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; }
        .badge-paid { background: #e8f5e9; color: var(--success); }
        .badge-pending { background: #ffebee; color: var(--danger); }
        .admin-link { display: block; text-align: center; margin-top: 30px; color: #888; text-decoration: none; font-size: 13px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-header">
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">HRMS Tea Club</h1>
            <p id="costDisplay" style="margin: 5px 0 0 0; opacity: 0.9;">Loading cost...</p>
        </div>
        <div class="fund-circle">
            <small style="font-size: 10px; text-transform: uppercase;">Net Funds</small>
            <span id="netFunds" style="font-size: 1.2rem; font-weight: bold;">₹0</span>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Join Club</h3>
            <form id="subForm">
                <input type="text" name="empId" placeholder="Employee ID" required inputmode="numeric">
                <input type="text" name="empName" placeholder="Full Name" required>
                <input type="hidden" name="action" value="ADD">
                <button type="submit" id="subBtn">Submit Subscription</button>
            </form>
            <div id="msg" style="text-align:center; color:var(--success); font-weight: bold;"></div>
        </div>

        <div class="card">
            <h3>Member Status</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Name</th><th>ID</th><th>Payment</th></tr></thead>
                    <tbody id="memberList"><tr><td colspan="3">Loading records...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <a href="admin.html" class="admin-link">🔒 Admin Login</a>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkuVfwWY-vLKex498qU3DgSEj7CBqzpKsAKscYAnBlFcc31mxT2mR9lSr_srpghgw8/exec';

    async function fetchData() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            document.getElementById('netFunds').innerText = "₹" + data.funds;
            document.getElementById('costDisplay').innerText = "Monthly Subscription: ₹" + data.cost;
            
            const list = document.getElementById('memberList');
            list.innerHTML = "";
            if(data.members.length === 0) {
                list.innerHTML = "<tr><td colspan='3' style='text-align:center'>No active members yet</td></tr>";
                return;
            }
            data.members.forEach(m => {
                list.innerHTML += `<tr>
                    <td>${m.name}</td>
                    <td>${m.id}</td>
                    <td><span class="badge ${m.paid === 'Yes' ? 'badge-paid' : 'badge-pending'}">${m.paid === 'Yes' ? 'PAID' : 'PENDING'}</span></td>
                </tr>`;
            });
        } catch (e) { 
            document.getElementById('memberList').innerHTML = "<tr><td colspan='3'>Connection Error</td></tr>";
        }
    }

    document.getElementById('subForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target) })
        .then(() => { 
            document.getElementById('msg').innerText = "Successfully Joined!";
            setTimeout(() => location.reload(), 1500);
        });
    });

    window.onload = fetchData;
</script>
</body>
</html>
