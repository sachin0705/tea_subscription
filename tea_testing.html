<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRMS Tea Club Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1e293b; 
            --accent: #3b82f6; 
            --bg: #f8fafc; 
            --success: #10b981; 
            --danger: #ef4444; 
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text-main);
            line-height: 1.5;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* Notification Bar */
        .alert-bar { 
            background: #fffbeb; 
            color: #92400e; 
            padding: 12px; 
            text-align: center; 
            font-weight: 600; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            font-size: 13px; 
            border: 1px solid #fef3c7;
        }

        /* Header Section */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 30px 20px; 
            border-radius: 20px; 
            margin-bottom: -40px; /* Overlap effect */
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: -0.5px; }
        .header p { margin: 5px 0 0; opacity: 0.7; font-size: 13px; }
        .month-tag { 
            background: rgba(255,255,255,0.1); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #fbbf24;
        }

        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            padding: 0 10px;
            margin-bottom: 25px;
        }
        .stat-card { 
            background: var(--card); 
            padding: 15px 10px; 
            border-radius: 16px; 
            text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .stat-card span { display: block; font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card b { font-size: 16px; color: var(--primary); }

        /* Main Cards */
        .card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .card h3 { margin: 0 0 15px 0; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

        /* Inputs */
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        input { 
            flex: 1; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; 
            font-size: 15px; transition: all 0.2s; background: #fdfdfd;
        }
        input:focus { border-color: var(--accent); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        button { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: var(--accent); color: white; font-weight: 600; cursor: pointer; 
            font-size: 15px; transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        
        .btn-secondary { background: #f1f5f9; color: #475569; margin-top: 10px; font-size: 13px; padding: 10px; }

        /* Status Table */
        .status-table { width: 100%; border-collapse: collapse; }
        .status-table th { text-align: left; font-size: 12px; color: var(--text-muted); padding: 10px 5px; border-bottom: 1px solid #f1f5f9; }
        .status-table td { padding: 14px 5px; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        
        .badge { 
            padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; 
        }
        .badge-paid { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fee2e2; color: #991b1b; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 24px; width: 85%; max-width: 400px; }

        .footer { text-align: center; margin-top: 20px; padding-bottom: 40px; }
        .admin-btn { color: var(--text-muted); text-decoration: none; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="alert-bar">☕ Please deposit cash with Admin to update status</div>

    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Tea Club</h1>
            <span id="currentMonth" class="month-tag">Loading...</span>
        </div>
        <p id="costDisplay">Monthly Subscription: ₹--</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span>Members</span>
            <b id="memberCount">0</b>
        </div>
        <div class="stat-card">
            <span>Collected</span>
            <b id="totalColl" style="color: var(--success);">₹0</b>
        </div>
        <div class="stat-card">
            <span>Net Funds</span>
            <b id="netFunds">₹0</b>
        </div>
    </div>

    <div style="margin: 0 10px 20px 10px;">
        <button class="btn-secondary" onclick="openExpenses()">📊 View Expense History</button>
    </div>

    <div class="card">
        <h3>Join / Renew</h3>
        <form id="subForm">
            <div class="input-group">
                <input type="text" name="empId" placeholder="Emp ID" required>
                <input type="text" name="empName" placeholder="Full Name" required>
            </div>
            <input type="hidden" name="action" value="ADD">
            <button type="submit" id="subBtn">Confirm Subscription</button>
        </form>
        <div id="msg" style="text-align:center; font-size:13px; margin-top:10px;"></div>
    </div>

    <div class="card">
        <h3>Member Status</h3>
        <div style="overflow-x:auto;">
            <table class="status-table">
                <thead>
                    <tr>
                        <th>MEMBER</th>
                        <th>ID</th>
                        <th style="text-align:right;">STATUS</th>
                    </tr>
                </thead>
                <tbody id="memberList"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <a href="admin.html" class="admin-btn">🔒 INTERNAL ADMIN ACCESS</a>
    </div>
</div>

<div id="expenseModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0;">Expense History</h3>
            <span style="cursor:pointer; font-weight:bold; color:var(--text-muted);" onclick="closeExpenses()">✕</span>
        </div>
        <div id="expenseDetails" style="max-height:300px; overflow-y:auto; font-size:14px;">
            </div>
    </div>
</div>

<script>
    // Replace with your actual Google Script URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz96eykqmJUE15UrT2FP1LXxYMIprxdmA2rLn_mC-889BDOTCb0MtkogJmcs86bVfoAuw/exec';
    let expenseData = [];

    async function loadData() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            expenseData = data.expenses || [];
            
            document.getElementById('currentMonth').innerText = data.month || "Current";
            document.getElementById('memberCount').innerText = data.totalCount || "0";
            document.getElementById('netFunds').innerText = "₹" + (data.funds || "0");
            document.getElementById('totalColl').innerText = "₹" + (data.totalColl || "0");
            document.getElementById('costDisplay').innerText = "Monthly Subscription: ₹" + (data.cost || "0");
            
            const list = document.getElementById('memberList');
            list.innerHTML = "";
            data.members.forEach(m => {
                const statusBadge = m.paid === 'Yes' ? 
                    '<span class="badge badge-paid">PAID</span>' : 
                    '<span class="badge badge-pending">PENDING</span>';
                
                list.innerHTML += `
                    <tr>
                        <td><b>${m.name}</b></td>
                        <td style="color:#64748b;">${m.id}</td>
                        <td style="text-align:right;">${statusBadge}</td>
                    </tr>`;
            });
        } catch (e) { console.error("Error loading data", e); }
    }

    function openExpenses() {
        const div = document.getElementById('expenseDetails');
        div.innerHTML = expenseData.length ? "" : "<p>No records found.</p>";
        expenseData.slice().reverse().forEach(ex => {
            div.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f1f5f9;">
                    <div>
                        <div style="font-weight:600;">${ex.desc}</div>
                        <div style="font-size:11px; color:#94a3b8;">${ex.date}</div>
                    </div>
                    <div style="color:var(--danger); font-weight:700;">-₹${ex.amt}</div>
                </div>`;
        });
        document.getElementById('expenseModal').style.display = "block";
    }

    function closeExpenses() { document.getElementById('expenseModal').style.display = "none"; }

    document.getElementById('subForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true; btn.innerText = "Processing...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target) })
        .then(() => { 
            document.getElementById('msg').innerHTML = "<span style='color:var(--success)'>Done! Refreshing...</span>";
            setTimeout(() => location.reload(), 1500);
        });
    });

    window.onload = loadData;
</script>
</body>
</html>
